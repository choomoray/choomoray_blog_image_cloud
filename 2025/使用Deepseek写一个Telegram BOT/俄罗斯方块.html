<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: #eee;
        }

        .game-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .game-container {
            position: relative;
        }

        canvas#gameCanvas {
            border: 3px solid #e94560;
            border-radius: 4px;
            background: #16213e;
            display: block;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 180px;
        }

        .panel-box {
            background: #16213e;
            border: 2px solid #0f3460;
            border-radius: 8px;
            padding: 15px;
        }

        .panel-box h3 {
            color: #e94560;
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .next-canvas {
            display: block;
            margin: 0 auto;
            background: transparent;
        }

        .score-value {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-align: center;
        }

        .level-value {
            font-size: 22px;
            font-weight: bold;
            color: #53d8fb;
            text-align: center;
        }

        .lines-value {
            font-size: 22px;
            font-weight: bold;
            color: #53d8fb;
            text-align: center;
        }

        .controls {
            font-size: 12px;
            line-height: 2;
        }

        .controls div {
            display: flex;
            justify-content: space-between;
        }

        .key {
            background: #0f3460;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            color: #53d8fb;
            min-width: 24px;
            text-align: center;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            z-index: 10;
        }

        .overlay.hidden {
            display: none;
        }

        .overlay h2 {
            font-size: 32px;
            color: #e94560;
            margin-bottom: 10px;
        }

        .overlay p {
            font-size: 16px;
            color: #ccc;
        }

        .start-btn {
            margin-top: 15px;
            padding: 10px 30px;
            font-size: 16px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .start-btn:hover {
            background: #c73652;
        }
    </style>
</head>

<body>

    <div class="game-wrapper">
        <div class="game-container">
            <canvas id="gameCanvas" width="300" height="600"></canvas>
            <div class="overlay" id="startOverlay">
                <h2>俄罗斯方块</h2>
                <p>按下方块控制游戏</p>
                <button class="start-btn" id="startBtn">开始游戏</button>
            </div>
            <div class="overlay hidden" id="gameOverOverlay">
                <h2>游戏结束</h2>
                <p id="finalScore"></p>
                <button class="start-btn" id="restartBtn">重新开始</button>
            </div>
            <div class="overlay hidden" id="pauseOverlay">
                <h2>暂停中</h2>
                <p>按 P 继续</p>
            </div>
        </div>

        <div class="side-panel">
            <div class="panel-box">
                <h3>分数</h3>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="panel-box">
                <h3>等级</h3>
                <div class="level-value" id="level">1</div>
            </div>
            <div class="panel-box">
                <h3>消除行数</h3>
                <div class="lines-value" id="lines">0</div>
            </div>
            <div class="panel-box">
                <h3>下一个</h3>
                <canvas class="next-canvas" id="nextCanvas" width="120" height="120"></canvas>
            </div>
            <div class="panel-box controls">
                <h3>操作</h3>
                <div><span class="key">A</span> <span>左移</span></div>
                <div><span class="key">D</span> <span>右移</span></div>
                <div><span class="key">W</span> <span>旋转</span></div>
                <div><span class="key">S</span> <span>下落</span></div>
                <div><span class="key">P</span> <span>暂停</span></div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');

        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = canvas.width / COLS;
        const NEXT_BLOCK_SIZE = 24;

        // 方块形状定义
        const SHAPES = {
            I: { blocks: [[0, 0], [1, 0], [2, 0], [3, 0]], color: '#00f5ff' },
            O: { blocks: [[0, 0], [1, 0], [0, 1], [1, 1]], color: '#ffd700' },
            T: { blocks: [[0, 0], [1, 0], [2, 0], [1, 1]], color: '#b44dff' },
            S: { blocks: [[1, 0], [2, 0], [0, 1], [1, 1]], color: '#00ff7f' },
            Z: { blocks: [[0, 0], [1, 0], [1, 1], [2, 1]], color: '#ff4444' },
            J: { blocks: [[0, 0], [0, 1], [1, 1], [2, 1]], color: '#4488ff' },
            L: { blocks: [[2, 0], [0, 1], [1, 1], [2, 1]], color: '#ff8c00' }
        };

        const SHAPE_NAMES = Object.keys(SHAPES);

        let board = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameRunning = false;
        let gamePaused = false;
        let dropInterval = 1000;
        let lastDrop = 0;
        let animationId = null;
        let softDropping = false;

        // Web Audio API 音效
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 播放消除音效 - 行数越多音效越激昂
        function playClearSound(cleared) {
            if (!audioCtx) return;

            const now = audioCtx.currentTime;

            // 基础音符 - 根据消除行数增加音符数量
            const baseFreqs = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
            const numNotes = Math.min(cleared, 4);

            // 创建主音
            for (let i = 0; i < numNotes; i++) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.connect(gain);
                gain.connect(audioCtx.destination);

                // 频率随消除行数递增
                const freq = baseFreqs[i] * (cleared >= 4 ? 2 : 1);
                osc.frequency.setValueAtTime(freq, now + i * 0.08);
                osc.type = 'square';

                // 音量包络
                gain.gain.setValueAtTime(0, now + i * 0.08);
                gain.gain.linearRampToValueAtTime(0.15, now + i * 0.08 + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.3);

                osc.start(now + i * 0.08);
                osc.stop(now + i * 0.08 + 0.3);
            }

            // 消除 2 行及以上添加和弦
            if (cleared >= 2) {
                const chordFreqs = [329.63, 392.00, 523.25, 659.25]; // E4, G4, C5, E5
                for (let i = 0; i < Math.min(cleared - 1, 4); i++) {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();

                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);

                    osc2.frequency.setValueAtTime(chordFreqs[i], now + 0.1 + i * 0.06);
                    osc2.type = 'triangle';

                    gain2.gain.setValueAtTime(0, now + 0.1 + i * 0.06);
                    gain2.gain.linearRampToValueAtTime(0.1, now + 0.1 + i * 0.06 + 0.02);
                    gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.1 + i * 0.06 + 0.25);

                    osc2.start(now + 0.1 + i * 0.06);
                    osc2.stop(now + 0.1 + i * 0.06 + 0.25);
                }
            }

            // 消除 4 行（Tetris）添加华丽效果音
            if (cleared >= 4) {
                // 快速上行音阶
                const arpeggio = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1568.00];
                for (let i = 0; i < arpeggio.length; i++) {
                    const osc3 = audioCtx.createOscillator();
                    const gain3 = audioCtx.createGain();

                    osc3.connect(gain3);
                    gain3.connect(audioCtx.destination);

                    osc3.frequency.setValueAtTime(arpeggio[i], now + 0.2 + i * 0.04);
                    osc3.type = 'sawtooth';

                    gain3.gain.setValueAtTime(0, now + 0.2 + i * 0.04);
                    gain3.gain.linearRampToValueAtTime(0.08, now + 0.2 + i * 0.04 + 0.01);
                    gain3.gain.exponentialRampToValueAtTime(0.001, now + 0.2 + i * 0.04 + 0.2);

                    osc3.start(now + 0.2 + i * 0.04);
                    osc3.stop(now + 0.2 + i * 0.04 + 0.2);
                }

                // 低音轰鸣
                const bass = audioCtx.createOscillator();
                const bassGain = audioCtx.createGain();
                bass.connect(bassGain);
                bassGain.connect(audioCtx.destination);
                bass.frequency.setValueAtTime(130.81, now);
                bass.type = 'sawtooth';
                bassGain.gain.setValueAtTime(0.2, now);
                bassGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                bass.start(now);
                bass.stop(now + 0.5);
            }
        }

        // 初始化棋盘
        function createBoard() {
            board = [];
            for (let r = 0; r < ROWS; r++) {
                board[r] = [];
                for (let c = 0; c < COLS; c++) {
                    board[r][c] = null;
                }
            }
        }

        // 创建方块
        function createPiece(type) {
            const shape = SHAPES[type];
            return {
                type: type,
                blocks: shape.blocks.map(b => [...b]),
                color: shape.color,
                x: Math.floor((COLS - 3) / 2),
                y: 0
            };
        }

        // 随机选择方块
        function randomPiece() {
            const type = SHAPE_NAMES[Math.floor(Math.random() * SHAPE_NAMES.length)];
            return createPiece(type);
        }

        // 碰撞检测
        function isValid(piece, offsetX = 0, offsetY = 0, newBlocks = null) {
            const blocks = newBlocks || piece.blocks;
            for (const [bx, by] of blocks) {
                const newX = piece.x + bx + offsetX;
                const newY = piece.y + by + offsetY;
                if (newX < 0 || newX >= COLS || newY >= ROWS) return false;
                if (newY >= 0 && board[newY][newX] !== null) return false;
            }
            return true;
        }

        // 固定方块到棋盘
        function lockPiece() {
            for (const [bx, by] of currentPiece.blocks) {
                const x = currentPiece.x + bx;
                const y = currentPiece.y + by;
                if (y < 0) {
                    gameOver();
                    return;
                }
                board[y][x] = currentPiece.color;
            }
            clearLines();
            currentPiece = nextPiece;
            nextPiece = randomPiece();
            if (!isValid(currentPiece)) {
                gameOver();
            }
        }

        // 消除行
        function clearLines() {
            let cleared = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(cell => cell !== null)) {
                    board.splice(r, 1);
                    const newRow = new Array(COLS).fill(null);
                    board.unshift(newRow);
                    cleared++;
                    r++;
                }
            }
            if (cleared > 0) {
                const points = [0, 100, 300, 500, 800];
                score += points[cleared] * level;
                lines += cleared;
                level = Math.floor(lines / 10) + 1;
                dropInterval = Math.max(100, 1000 - (level - 1) * 80);
                updateUI();
                // 播放消除音效
                playClearSound(cleared);
            }
        }

        // 旋转方块
        function rotatePiece() {
            if (currentPiece.type === 'O') return;
            const centerX = currentPiece.blocks.reduce((s, b) => s + b[0], 0) / currentPiece.blocks.length;
            const centerY = currentPiece.blocks.reduce((s, b) => s + b[1], 0) / currentPiece.blocks.length;

            const newBlocks = currentPiece.blocks.map(([x, y]) => {
                const dx = x - centerX;
                const dy = y - centerY;
                return [Math.round(centerX - dy + 0.5), Math.round(centerY + dx - 0.5)];
            });

            const kicks = [0, -1, 1, -2, 2];
            for (const kick of kicks) {
                if (isValid(currentPiece, kick, 0, newBlocks)) {
                    currentPiece.blocks = newBlocks;
                    currentPiece.x += kick;
                    return;
                }
            }
        }

        // 移动方块
        function movePiece(dx, dy) {
            if (isValid(currentPiece, dx, dy)) {
                currentPiece.x += dx;
                currentPiece.y += dy;
                return true;
            }
            return false;
        }

        // 硬降
        function hardDrop() {
            while (movePiece(0, 1)) {
                score += 2;
            }
            lockPiece();
            updateUI();
        }

        // 计算硬降位置（用于显示幽灵）
        function getGhostY() {
            let ghostY = 0;
            while (true) {
                let canMove = true;
                for (const [bx, by] of currentPiece.blocks) {
                    const x = currentPiece.x + bx;
                    const y = currentPiece.y + by + ghostY + 1;
                    if (y >= ROWS || (y >= 0 && board[y][x] !== null)) {
                        canMove = false;
                        break;
                    }
                }
                if (!canMove) break;
                ghostY++;
            }
            return ghostY;
        }

        // 绘制单个方块
        function drawBlock(context, x, y, color, size, isGhost = false) {
            if (isGhost) {
                // 幽灵方块：用更淡的同色填充，方便区分落点
                context.globalAlpha = 0.15;
                context.fillStyle = color;
                context.fillRect(x * size, y * size, size, size);
                context.globalAlpha = 0.4;
                context.strokeStyle = color;
                context.lineWidth = 1;
                context.strokeRect(x * size + 0.5, y * size + 0.5, size - 1, size - 1);
                context.globalAlpha = 1;
                return;
            }
            context.fillStyle = color;
            context.fillRect(x * size, y * size, size, size);
            // 高光
            context.fillStyle = 'rgba(255,255,255,0.2)';
            context.fillRect(x * size, y * size, size, 3);
            context.fillRect(x * size, y * size, 3, size);
            // 阴影
            context.fillStyle = 'rgba(0,0,0,0.2)';
            context.fillRect(x * size + size - 3, y * size, 3, size);
            context.fillRect(x * size, y * size + size - 3, size, 3);
            // 边框
            context.strokeStyle = 'rgba(0,0,0,0.3)';
            context.lineWidth = 1;
            context.strokeRect(x * size, y * size, size, size);
        }

        // 绘制棋盘
        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 网格线
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            for (let r = 0; r <= ROWS; r++) {
                ctx.beginPath();
                ctx.moveTo(0, r * BLOCK_SIZE);
                ctx.lineTo(canvas.width, r * BLOCK_SIZE);
                ctx.stroke();
            }
            for (let c = 0; c <= COLS; c++) {
                ctx.beginPath();
                ctx.moveTo(c * BLOCK_SIZE, 0);
                ctx.lineTo(c * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }

            // 已固定的方块
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c]) {
                        drawBlock(ctx, c, r, board[r][c], BLOCK_SIZE);
                    }
                }
            }
        }

        // 绘制当前方块
        function drawPiece() {
            if (!currentPiece) return;

            // 幽灵方块（落点预览）
            const ghostY = getGhostY();
            for (const [bx, by] of currentPiece.blocks) {
                drawBlock(ctx, currentPiece.x + bx, currentPiece.y + by + ghostY, currentPiece.color, BLOCK_SIZE, true);
            }

            // 实际方块
            for (const [bx, by] of currentPiece.blocks) {
                const y = currentPiece.y + by;
                if (y >= 0) {
                    drawBlock(ctx, currentPiece.x + bx, y, currentPiece.color, BLOCK_SIZE);
                }
            }
        }

        // 绘制下一个方块
        function drawNext() {
            nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (!nextPiece) return;

            const minX = Math.min(...nextPiece.blocks.map(b => b[0]));
            const maxX = Math.max(...nextPiece.blocks.map(b => b[0]));
            const minY = Math.min(...nextPiece.blocks.map(b => b[1]));
            const maxY = Math.max(...nextPiece.blocks.map(b => b[1]));
            const pieceW = maxX - minX + 1;
            const pieceH = maxY - minY + 1;
            const offsetX = (nextCanvas.width - pieceW * NEXT_BLOCK_SIZE) / 2 / NEXT_BLOCK_SIZE;
            const offsetY = (nextCanvas.height - pieceH * NEXT_BLOCK_SIZE) / 2 / NEXT_BLOCK_SIZE;

            for (const [bx, by] of nextPiece.blocks) {
                const x = (bx - minX) + offsetX;
                const y = (by - minY) + offsetY;
                drawBlock(nextCtx, x, y, nextPiece.color, NEXT_BLOCK_SIZE);
            }
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }

        // 游戏主循环
        function gameLoop(timestamp) {
            if (!gameRunning || gamePaused) return;

            if (timestamp - lastDrop > (softDropping ? 50 : dropInterval)) {
                if (!movePiece(0, 1)) {
                    lockPiece();
                } else if (softDropping) {
                    score += 1;
                    updateUI();
                }
                lastDrop = timestamp;
            }

            drawBoard();
            drawPiece();
            drawNext();

            animationId = requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        function startGame() {
            // 初始化音频
            initAudio();

            createBoard();
            score = 0;
            level = 1;
            lines = 0;
            dropInterval = 1000;
            softDropping = false;
            updateUI();

            currentPiece = randomPiece();
            nextPiece = randomPiece();

            gameRunning = true;
            gamePaused = false;

            document.getElementById('startOverlay').classList.add('hidden');
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('pauseOverlay').classList.add('hidden');

            lastDrop = performance.now();
            animationId = requestAnimationFrame(gameLoop);
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            if (animationId) cancelAnimationFrame(animationId);
            document.getElementById('finalScore').textContent = '最终分数: ' + score;
            document.getElementById('gameOverOverlay').classList.remove('hidden');
        }

        // 暂停/继续
        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            if (gamePaused) {
                document.getElementById('pauseOverlay').classList.remove('hidden');
            } else {
                document.getElementById('pauseOverlay').classList.add('hidden');
                lastDrop = performance.now();
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || gamePaused) {
                if (e.key === 'p' || e.key === 'P') togglePause();
                return;
            }

            // 初始化音频（首次按键）
            initAudio();

            switch (e.key) {
                case 'a':
                case 'A':
                    movePiece(-1, 0);
                    break;
                case 'd':
                case 'D':
                    movePiece(1, 0);
                    break;
                case 'w':
                case 'W':
                    rotatePiece();
                    break;
                case 's':
                case 'S':
                    softDropping = true;
                    break;
                case ' ':
                    hardDrop();
                    break;
                case 'p':
                case 'P':
                    togglePause();
                    break;
            }
            e.preventDefault();
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 's' || e.key === 'S') {
                softDropping = false;
            }
        });

        // 按钮事件
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // 初始绘制
        drawBoard();
    </script>

</body>

</html>
